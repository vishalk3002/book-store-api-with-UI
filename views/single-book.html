<!doctype html>
<html>
  <body>
    <h2>Find Book By ID</h2>

    <input id="id" placeholder="Enter Book ID" />
    <button onclick="getBook()">Search</button>

    <div id="result"></div>

    <script>
      async function getBook() {
        const id = document.getElementById("id").value;
        const resultDiv = document.getElementById("result");

        try {
          const res = await fetch(`/api/books/get/${id}`);

          // If status is not 200, show error
          if (!res.ok) {
            const errorData = await res.json();
            resultDiv.innerHTML = `<p style="color:red;">${errorData.message}</p>`;
            return;
          }

          const data = await res.json();
          const book = data.data;

          resultDiv.innerHTML = `
        <h3>Book Details</h3>
        ID: ${book._id} <br>
        Title: ${book.title} <br>
        Author: ${book.author} <br>
        Year: ${book.year}
      `;
        } catch (err) {
          // Catch network or unexpected errors
          resultDiv.innerHTML = `<p style="color:red;">An unexpected error occurred. Please try again.</p>`;
          console.error(err);
        }
      }
    </script>
  </body>
</html>
